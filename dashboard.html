<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Faithlife Cleaning Services</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            padding: 8rem 2rem 4rem;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 80vh;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2.5rem;
        }
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-container {
                padding-top: 6rem;
            }
        }
        .profile-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 4px solid #f8fafc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .history-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .history-item {
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-programada { background: #fef08a; color: #854d0e; }
        .status-completado { background: #dcfce7; color: #166534; }
        .status-cancelado { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-gray" style="margin:0; padding:0;">
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
                <span class="logo-brand"><span>FAITH</span><span class="logo-life">LIFE</span></span>
                <span class="logo-slogan" style="display:block;">Cleaning Services</span>
            </div>
            <nav class="nav-links" style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="index.html">Inicio</a>
                <a href="galeria.html">Galería</a>
                <a href="index.html#contacto" class="btn-metallic">Solicitar Cita</a>
            </nav>
            <div id="user-badge" style="display:none; align-items:center; gap:10px; margin-left:1.5rem;">
                <img id="user-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" alt="foto" style="width:36px; height:36px; border-radius:50%; border:2px solid rgba(255,255,255,0.4); object-fit:cover; cursor:pointer;" onclick="window.location.href='dashboard.html'" title="Ir a mi Dashboard">
                <span id="user-name" style="color:white; font-size:0.85rem; font-weight:600; max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;" onclick="window.location.href='dashboard.html'" title="Ir a mi Dashboard"></span>
                <button id="logout-btn-nav" title="Cerrar Sesión" style="background:none; border:none; color:#fda4af; cursor:pointer; padding:5px; display:flex;">
                    <i class="ph ph-sign-out" style="font-size:1.1rem;"></i>
                </button>
            </div>
            <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
        </div>
    </header>

    <!-- Dashboard Content -->
    <main class="dashboard-container">
        <div class="dashboard-grid">
            <!-- Profile Section -->
            <div class="profile-card">
                <img id="dash-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" alt="Perfil" class="profile-img">
                <h2 id="dash-name" style="font-size: 1.5rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem;">Cargando...</h2>
                <p id="dash-email" style="color: #64748b; font-size: 0.95rem; margin-bottom: 2rem;">...</p>
                <div style="background: #f8fafc; padding: 1rem; border-radius: 12px; text-align: left;">
                    <p style="font-size: 0.85rem; color: #94a3b8; font-weight: 600; text-transform: uppercase;">Rol de Cuenta</p>
                    <p id="dash-role" style="font-weight: 600; color: #1e293b;">Cliente</p>
                </div>
                <button onclick="window.location.href='index.html'" class="btn-metallic" style="width: 100%; margin-top: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 8px;">
                    <i class="ph ph-house" style="font-size: 1.2rem;"></i> Volver al Inicio
                </button>
            </div>

            <!-- History Section -->
            <div class="history-card">
                <h2 style="font-family: var(--font-heading); font-size: 2rem; color: #1e293b; margin-bottom: 1.5rem;">Mi Historial de Servicios</h2>
                <div id="citas-list">
                    <p style="text-align: center; color: #64748b; padding: 2rem;">Cargando historial...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="display: flex; justify-content: space-between; align-items: center;">
                <p>&copy; 2026 Faithlife Cleaning Services. Desarrollado por Freedom Labs.</p>
                <a href="admin.html" title="Panel de Administración" style="color: var(--metallic-silver); opacity: 0.5; transition: opacity 0.2s;">
                    <i class="ph ph-shield-check" style="font-size: 1.5rem;"></i>
                </a>
            </div>
        </div>
    </footer>

    <!-- Firebase Auth & Layout -->
    <script type="module" src="main.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>

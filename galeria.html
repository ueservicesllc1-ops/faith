<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Completa | Faithlife Cleaning Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-gray">
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo">
                <span class="logo-brand"><span>FAITH</span><span class="logo-life">LIFE</span></span>
                <span class="logo-slogan">Cleaning Services</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="index.html#servicios">Servicios</a>
                <a href="index.html#nosotros">Nosotros</a>
                <a href="#" class="active">Galería</a>
                <a href="login.html" class="nav-login">Acceder</a>
                <a href="index.html#contacto" class="btn-metallic">Solicitar Cita</a>
            </nav>
            <div id="user-badge" style="display:none; align-items:center; gap:10px; margin-left:1.5rem;">
                <img id="user-photo" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>" alt="foto" style="width:36px; height:36px; border-radius:50%; border:2px solid rgba(255,255,255,0.4); object-fit:cover; cursor:pointer;" onclick="window.location.href='dashboard.html'" title="Ir a mi Dashboard">
                <span id="user-name" style="color:white; font-size:0.85rem; font-weight:600; max-width:100px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;" onclick="window.location.href='dashboard.html'" title="Ir a mi Dashboard"></span>
                <button id="logout-btn-nav" title="Cerrar Sesión" style="background:none; border:none; color:#fda4af; cursor:pointer; padding:5px; display:flex;">
                    <i class="ph ph-sign-out" style="font-size:1.1rem; transition: color 0.2s;"></i>
                </button>
            </div>
            <button class="mobile-menu-btn">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </header>

    <main style="padding-top: 150px;">
        <section class="gallery-full">
            <div class="container">
                <div class="section-header">
                    <h2>Nuestra Galería Completa</h2>
                    <p>Cada imagen cuenta una historia de limpieza y dedicación.</p>
                </div>
                <div id="gallery-grid" class="gallery-grid">
                    <div class="gallery-loader">
                        <i class="ph ph-circle-notch ph-spin"></i>
                        <p>Cargando todas las imágenes...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="display: flex; justify-content: space-between; align-items: center;">
                <p>&copy; 2026 Faithlife Cleaning Services. Desarrollado por Freedom Labs.</p>
                <a href="admin.html" title="Panel de Administración" style="color: var(--metallic-silver); opacity: 0.5; transition: opacity 0.2s;">
                    <i class="ph ph-shield-check" style="font-size: 1.5rem;"></i>
                </a>
            </div>
        </div>
    </footer>

    <script type="module" src="gallery.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
